name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  backend-quality-gates:
    name: Backend Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: gateway-server/go.mod
      - name: Run CI quality gates
        run: ./scripts/ci/run_quality_gates.sh
      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-quality-gates-artifacts
          path: artifacts/ci
          if-no-files-found: warn

  frontend:
    name: Frontend Build + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: gateway-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gateway-ui/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  docker-buildx-example:
    name: Docker Buildx Multi-arch Example
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build multi-arch image example (no push)
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg TARGETOS=linux \
            --tag siptunnel/gateway-server:ci-example \
            --output type=oci,dest=/tmp/gateway-server-ci-example.tar \
            ./gateway-server
