name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  backend:
    name: Backend Test + Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: gateway-server/go.mod
      - name: Go test
        run: go test ./...
      - name: gofmt check
        run: |
          test -z "$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))"
      - name: Multi-arch backend build example
        working-directory: .
        run: ./scripts/build.sh matrix

  frontend:
    name: Frontend Build + Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gateway-ui/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  docker-buildx-example:
    name: Docker Buildx Multi-arch Example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build multi-arch image example (no push)
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg TARGETOS=linux \
            --tag siptunnel/gateway-server:ci-example \
            --output type=oci,dest=/tmp/gateway-server-ci-example.tar \
            ./gateway-server
