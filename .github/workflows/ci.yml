name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  backend:
    name: Backend Test + Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: gateway-server/go.mod
      - name: Go test
        run: go test ./...
      - name: gofmt check
        run: |
          test -z "$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))"

  frontend:
    name: Frontend Build + Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gateway-ui/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
