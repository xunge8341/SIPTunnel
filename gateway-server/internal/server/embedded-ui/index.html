      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 2rem; color: #0f172a; }

  <body>
    <div class="card">
      <h2>SIPTunnel Embedded UI 首次部署引导</h2>
      <p>当前正在使用内置占位 UI，说明前端构建产物尚未嵌入。网关 API 仍可正常联调与验收。</p>
      <ol>
        <li>在仓库根目录执行 <code>./scripts/embed-ui.sh</code> 嵌入 UI 产物。</li>
        <li>执行 <code>./scripts/verify-embedded-ui.sh</code> 校验嵌入结果。</li>
        <li>重新构建并启动网关，访问 <code>/</code> 或配置的 UI BasePath。</li>
      </ol>
      <p>Windows 打包环境可参考 <code>docs/windows-operations.md</code> 中的首启排障建议。</p>
    </div>
  </body>
</html>
