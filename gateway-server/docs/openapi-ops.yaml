openapi: 3.0.3
info:
  title: SIPTunnel Gateway Ops API
  version: 1.0.0
paths:
  /api/tasks:
    get:
      summary: List tasks
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: page_size
          schema: { type: integer, minimum: 1, maximum: 200, default: 20 }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: request_id
          schema: { type: string }
        - in: query
          name: trace_id
          schema: { type: string }
      responses:
        '200': { description: OK }
  /api/tasks/{id}:
    get:
      summary: Get task detail
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
        '404': { description: Not found }
  /api/tasks/{id}/retry:
    post:
      summary: Retry task
      responses:
        '200': { description: OK }
  /api/tasks/{id}/cancel:
    post:
      summary: Cancel task
      responses:
        '200': { description: OK }
  /api/limits:
    get: { summary: Get runtime limits, responses: { '200': { description: OK } } }
    put: { summary: Update runtime limits, responses: { '200': { description: OK } } }
  /api/mappings:
    get: { summary: List tunnel mappings (primary model), responses: { '200': { description: OK } } }
    post: { summary: Create tunnel mapping, responses: { '201': { description: Created }, '400': { description: Invalid argument }, '409': { description: Mapping exists } } }
  /api/mappings/{id}:
    put:
      summary: Update tunnel mapping
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
        '400': { description: Invalid argument }
        '404': { description: Mapping not found }
    delete:
      summary: Delete tunnel mapping
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
        '404': { description: Mapping not found }
  /api/routes:
    get: { summary: '[Deprecated] List legacy ops routes compatibility view', responses: { '200': { description: OK } } }
    put: { summary: '[Deprecated] Update legacy ops routes and backfill tunnel mappings', responses: { '200': { description: OK } } }
  /api/nodes:
    get: { summary: List gateway nodes, responses: { '200': { description: OK } } }
  /api/audits:
    get:
      summary: List audit logs
      parameters:
        - in: query
          name: request_id
          schema: { type: string }
        - in: query
          name: trace_id
          schema: { type: string }
      responses:
        '200': { description: OK }

  /api/node:
    get: { summary: Get local node config, responses: { '200': { description: OK } } }
    put: { summary: Update local node config, responses: { '200': { description: OK }, '400': { description: Invalid argument } } }
  /api/peers:
    get: { summary: List peer node configs, responses: { '200': { description: OK } } }
    post: { summary: Create peer node config, responses: { '201': { description: Created }, '400': { description: Invalid argument }, '409': { description: Peer already exists } } }
  /api/peers/{peer_node_id}:
    put:
      summary: Update peer node config
      parameters:
        - in: path
          name: peer_node_id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
        '400': { description: Invalid argument }
        '404': { description: Peer not found }
    delete:
      summary: Delete peer node config
      parameters:
        - in: path
          name: peer_node_id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
        '404': { description: Peer not found }
  /api/node/network-status:
    get:
      summary: Get current node network configuration and runtime status
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: string, example: OK }
                  message: { type: string, example: success }
                  data:
                    type: object
                    properties:
                      sip:
                        type: object
                        properties:
                          listen_ip: { type: string }
                          listen_port: { type: integer }
                          transport: { type: string }
                          current_sessions: { type: integer }
                          current_connections: { type: integer }
                          accepted_connections_total: { type: integer, format: uint64 }
                          closed_connections_total: { type: integer, format: uint64 }
                          read_timeout_total: { type: integer, format: uint64 }
                          write_timeout_total: { type: integer, format: uint64 }
                          connection_error_total: { type: integer, format: uint64 }
                          tcp_keepalive_enabled: { type: boolean }
                          tcp_keepalive_interval_ms: { type: integer }
                          tcp_read_buffer_bytes: { type: integer }
                          tcp_write_buffer_bytes: { type: integer }
                          max_connections: { type: integer }
                      rtp:
                        type: object
                        properties:
                          listen_ip: { type: string }
                          port_start: { type: integer }
                          port_end: { type: integer }
                          transport: { type: string }
                          active_transfers: { type: integer }
                          used_ports: { type: integer }
                          available_ports: { type: integer }
                          rtp_port_pool_total: { type: integer }
                          rtp_port_pool_used: { type: integer }
                          rtp_port_alloc_fail_total: { type: integer }
                          rtp_tcp_sessions_current: { type: integer, format: int64 }
                          rtp_tcp_sessions_total: { type: integer, format: uint64 }
                          rtp_tcp_read_errors_total: { type: integer, format: uint64 }
                          rtp_tcp_write_errors_total: { type: integer, format: uint64 }
                      recent_bind_errors:
                        type: array
                        items: { type: string }
                      recent_network_errors:
                        type: array
                        items: { type: string }


  /api/capacity/recommendation:
    post:
      summary: Assess capacity and rate-limit recommendation by loadtest summary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [summary_file]
              properties:
                summary_file: { type: string, description: Path to loadtest summary.json on gateway host }
                current:
                  type: object
                  properties:
                    command_max_concurrent: { type: integer }
                    file_transfer_max_concurrent: { type: integer }
                    rtp_port_pool_size: { type: integer }
                    max_connections: { type: integer }
                    rate_limit_rps: { type: integer }
                    rate_limit_burst: { type: integer }
      responses:
        '200': { description: OK }
        '400': { description: Invalid argument }
  /api/diagnostics/export:
    get:
      summary: Export diagnostics manifest snapshot
      parameters:
        - in: query
          name: request_id
          schema: { type: string }
          description: optional request_id scoped export
        - in: query
          name: trace_id
          schema: { type: string }
          description: optional trace_id scoped export
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: string, example: OK }
                  message: { type: string, example: success }
                  data:
                    type: object
                    properties:
                      generated_at: { type: string, format: date-time }
                      node_id: { type: string }
                      request_id: { type: string }
                      trace_id: { type: string }
                      file_name: { type: string }
                      output_dir: { type: string }
                      files:
                        type: array
                        items:
                          type: object
                          properties:
                            name: { type: string }
                            description: { type: string }
                            content: {}
