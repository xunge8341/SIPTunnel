server:
  port: 18080

storage:
  temp_dir: ./data/temp
  final_dir: ./data/final
  audit_dir: ./data/audit
  log_dir: ./data/logs

sip:
  enabled: true
  listen_ip: 0.0.0.0
  listen_port: 5060
  transport: TCP
  advertise_ip: 192.168.10.10
  domain: siptunnel.local
  max_message_bytes: 65535
  read_timeout_ms: 5000
  write_timeout_ms: 5000
  idle_timeout_ms: 60000
  tcp_keepalive_enabled: true
  tcp_keepalive_interval_ms: 30000
  tcp_read_buffer_bytes: 65536
  tcp_write_buffer_bytes: 65536
  max_connections: 2048

rtp:
  enabled: true
  listen_ip: 0.0.0.0
  advertise_ip: 192.168.10.10
  port_start: 20000
  port_end: 20100
  transport: UDP
  max_packet_bytes: 1400
  tcp_read_timeout_ms: 5000
  tcp_write_timeout_ms: 5000
  tcp_keepalive_enabled: true
  max_tcp_sessions: 128
  max_inflight_transfers: 64
  receive_buffer_bytes: 4194304
  transfer_timeout_ms: 30000
  retransmit_max_rounds: 3

observability:
  log_level: info
  pprof_enabled: false
  metrics_enabled: true

ui:
  enabled: true
  mode: external
  listen_ip: 127.0.0.1
  listen_port: 18080
  base_path: /

ops:
  run_mode: dev
  allow_auto_init_config: true

# 兼容旧版配置格式（network.*）
network:
  sip:
    enabled: true
    listen_ip: 0.0.0.0
    listen_port: 5060
    transport: TCP
    advertise_ip: 192.168.10.10
    domain: siptunnel.local
    max_message_bytes: 65535
    read_timeout_ms: 5000
    write_timeout_ms: 5000
    idle_timeout_ms: 60000
    tcp_keepalive_enabled: true
    tcp_keepalive_interval_ms: 30000
    tcp_read_buffer_bytes: 65536
    tcp_write_buffer_bytes: 65536
    max_connections: 2048

  rtp:
    enabled: true
    listen_ip: 0.0.0.0
    advertise_ip: 192.168.10.10
    port_start: 20000
    port_end: 20100
    transport: UDP
    max_packet_bytes: 1400
    tcp_read_timeout_ms: 5000
    tcp_write_timeout_ms: 5000
    tcp_keepalive_enabled: true
    max_tcp_sessions: 128
    max_inflight_transfers: 64
    receive_buffer_bytes: 4194304
    transfer_timeout_ms: 30000
    retransmit_max_rounds: 3
