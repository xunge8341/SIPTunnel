# gateway.exe init-config 生成示例
server:
  port: 18080

sip:
  enabled: true
  listen_ip: 0.0.0.0
  listen_port: 5060
  transport: TCP

rtp:
  enabled: true
  listen_ip: 0.0.0.0
  port_start: 20000
  port_end: 20100
  transport: UDP

storage:
  temp_dir: ./data/temp
  final_dir: ./data/final
  audit_dir: ./data/audit
  log_dir: ./data/logs

observability:
  log_level: info

ui:
  enabled: true
  mode: external
  listen_ip: 127.0.0.1
  listen_port: 18080
  base_path: /

ops:
  run_mode: dev
